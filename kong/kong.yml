_format_version: "3.0"

services:
  - name: api-service
    url: http://api:8080
    routes:
      - name: api-route
        paths:
          - /api
        strip_path: false

  - name: ws-service
    url: http://api:8080
    routes:
      - name: ws-route
        paths:
          - /ws
        strip_path: false
        protocols:
          - http
          - https

  - name: frontend-service
    url: http://frontend:5174
    routes:
      - name: frontend-route
        paths:
          - /
        strip_path: false

